<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory · Алиса 🧠</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f4f0e8;
  --surface:#fff;
  --text:#3a3226;
  --text2:#8a7e6e;
  --text3:#bbb09e;
  --de:#2d6a4f;
  --de-bg:#e8f5ee;
  --de-border:#b7dfc8;
  --bg-lang:#7c4dff;
  --bg-bg:#f3eeff;
  --bg-border:#d4c2ff;
  --accent:#e07850;
  --matched:#f9f3e3;
  --gold:#e8a830;
  --shadow:0 2px 12px rgba(60,50,30,.08);
  --radius:14px;
}

body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Outfit',sans-serif;
  color:var(--text);
  padding:16px;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(224,120,80,.06),transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(124,77,255,.05),transparent 50%);
}

.app{
  max-width:560px;
  margin:0 auto;
  position:relative;z-index:1;
}

header{
  text-align:center;
  margin-bottom:20px;
  animation:fadeIn .6s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,5.5vw,30px);
  color:var(--text);
  font-weight:600;
  margin-bottom:2px;
}
header .sub{
  font-size:12px;color:var(--text2);
  letter-spacing:1.5px;
}

/* top bar */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
  animation:fadeIn .6s ease .1s both;
}
.moves{
  font-size:13px;color:var(--text2);
  font-weight:500;
}
.moves span{
  font-weight:600;color:var(--text);
  font-family:'Playfair Display',serif;
  font-size:18px;
}
.timer{
  font-size:13px;color:var(--text2);
  font-weight:500;
}
.timer span{
  font-weight:600;color:var(--text);
  font-family:'Playfair Display',serif;
  font-size:18px;
}
.pairs-left{
  font-size:12px;
  color:var(--text3);
  background:var(--surface);
  padding:5px 12px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,.06);
}
.pairs-left b{color:var(--accent)}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
  animation:fadeIn .6s ease .15s both;
}

.cell{
  aspect-ratio:.82;
  perspective:800px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.cell-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .4s cubic-bezier(.4,.0,.2,1);
}
.cell.flipped .cell-inner{transform:rotateY(180deg)}
.cell.matched .cell-inner{transform:rotateY(180deg)}

.cell-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:var(--radius);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8px 6px;
  text-align:center;
}

.cell-back-face{
  background:var(--surface);
  border:2px solid rgba(0,0,0,.06);
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:border-color .2s, box-shadow .2s;
}
.cell:not(.flipped):not(.matched):hover .cell-back-face{
  border-color:var(--accent);
  box-shadow:0 4px 20px rgba(224,120,80,.15);
}

.cell-back-face .qmark{
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:var(--text3);
  transition:color .2s;
}
.cell:not(.flipped):not(.matched):hover .qmark{color:var(--accent)}

.cell-front-face{
  transform:rotateY(180deg);
  border:2px solid transparent;
  box-shadow:var(--shadow);
}
.cell-front-face.de-card{
  background:var(--de-bg);
  border-color:var(--de-border);
}
.cell-front-face.bg-card{
  background:var(--bg-bg);
  border-color:var(--bg-border);
}

.cell.matched .cell-front-face{
  opacity:.55;
  filter:saturate(.4);
  transform:rotateY(180deg) scale(.95);
  transition:all .5s ease;
}

.cell-lang{
  font-size:8px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:4px;
}
.de-card .cell-lang{color:var(--de)}
.bg-card .cell-lang{color:var(--bg-lang)}

.cell-word{
  font-size:clamp(10px,2.6vw,13px);
  font-weight:500;
  line-height:1.3;
  word-break:break-word;
  hyphens:auto;
}
.de-card .cell-word{color:var(--de)}
.bg-card .cell-word{color:var(--bg-lang)}

.cell-flag{
  font-size:14px;
  margin-top:4px;
}

/* match animation */
@keyframes matchPop{
  0%{transform:rotateY(180deg) scale(1)}
  30%{transform:rotateY(180deg) scale(1.08)}
  100%{transform:rotateY(180deg) scale(.95)}
}
.cell.just-matched .cell-inner{
  animation:matchPop .5s ease;
}

/* wrong shake */
@keyframes wrongShake{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-6px)}
  40%{transform:rotateY(180deg) translateX(6px)}
  60%{transform:rotateY(180deg) translateX(-4px)}
  80%{transform:rotateY(180deg) translateX(4px)}
}
.cell.wrong-pick .cell-inner{
  animation:wrongShake .4s ease;
}

/* progress dots */
.progress-dots{
  display:flex;justify-content:center;gap:8px;
  margin-bottom:20px;
  animation:fadeIn .6s ease .2s both;
}
.pdot{
  width:10px;height:10px;
  border-radius:50%;
  background:var(--text3);
  opacity:.3;
  transition:all .4s ease;
}
.pdot.done{
  background:var(--gold);
  opacity:1;
  transform:scale(1.2);
}

/* celebration */
.win-overlay{
  position:fixed;inset:0;
  background:rgba(244,240,232,.85);
  backdrop-filter:blur(8px);
  z-index:100;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity .5s;
}
.win-overlay.show{opacity:1;pointer-events:auto}

.win-card{
  background:var(--surface);
  border-radius:20px;
  padding:clamp(28px,6vw,48px);
  text-align:center;
  box-shadow:0 20px 60px rgba(60,40,20,.12);
  max-width:380px;width:100%;
  transform:translateY(20px) scale(.95);
  transition:transform .5s cubic-bezier(.3,0,.2,1);
}
.win-overlay.show .win-card{transform:none}

.win-card .emoji{font-size:48px;margin-bottom:12px}
.win-card h2{
  font-family:'Playfair Display',serif;
  font-size:24px;margin-bottom:6px;
  color:var(--text);
}
.win-card .stats-line{
  font-size:14px;color:var(--text2);
  margin-bottom:6px;
}
.win-card .stars{font-size:28px;margin:12px 0}
.win-card .msg{
  font-size:13px;color:var(--text2);
  margin-bottom:20px;
  line-height:1.6;
}
.win-card button{
  padding:12px 28px;
  border:none;border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;
  transition:all .25s;
}
.win-card button:hover{filter:brightness(1.1);transform:scale(1.03)}

/* confetti */
.confetto{
  position:fixed;
  width:8px;height:8px;
  border-radius:2px;
  pointer-events:none;
  z-index:101;
  opacity:0;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

/* hint tooltip */
.hint-toast{
  position:fixed;
  bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--text);
  color:var(--bg);
  padding:10px 20px;
  border-radius:10px;
  font-size:13px;font-weight:500;
  z-index:50;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.hint-toast.show{opacity:.9}

@media(max-width:380px){
  .grid{gap:7px}
}
</style>
</head>
<body>
<div class="app">

<header>
  <h1>🧩 Намери двойките</h1>
  <div class="sub">DEUTSCH ↔ БЪЛГАРСКИ · MEMORY GAME</div>
</header>

<div class="topbar">
  <div class="moves">Ходове: <span id="movesNum">0</span></div>
  <div class="pairs-left">Остават <b id="pairsLeft">10</b> двойки</div>
  <div class="timer">⏱ <span id="timerNum">0:00</span></div>
</div>

<div class="progress-dots" id="dots"></div>

<div class="grid" id="grid"></div>

<div class="hint-toast" id="hintToast"></div>

</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="emoji">🎊🧠✨</div>
    <h2>Браво, Алиса!</h2>
    <div class="stats-line">Ходове: <b id="winMoves"></b></div>
    <div class="stats-line">Време: <b id="winTime"></b></div>
    <div class="stars" id="winStars"></div>
    <div class="msg">Виж — научи 10 думи и дори не усети!<br>Искаш ли пак? Редът е различен всеки път 😊</div>
    <button onclick="restartGame()">🔄 Още веднъж!</button>
  </div>
</div>

<script>
const WORDS = [
  { de: "die Miete", bg: "Наем" },
  { de: "die Nebenkosten", bg: "Допълнителни разходи" },
  { de: "die Größe der Wohnung", bg: "Размер на жилището" },
  { de: "ruhiges Wohnviertel", bg: "Тих жилищен район" },
  { de: "nette Nachbarn", bg: "Добри съседи" },
  { de: "im oberen Stock", bg: "На горния етаж" },
  { de: "zentrale Lage", bg: "Централно местоположение" },
  { de: "helle Wohnung", bg: "Светъл апартамент" },
  { de: "gemütliches Wohnzimmer", bg: "Уютна всекидневна" },
  { de: "Terrasse auf dem Dach", bg: "Тераса на покрива" }
];

let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let locked = false;
let timerInterval = null;
let seconds = 0;
let gameStarted = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('span');
    d.className = 'pdot';
    d.id = 'dot' + i;
    el.appendChild(d);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // create card data: 10 DE + 10 BG = 20 cards in 5x4 grid
  cards = [];
  WORDS.forEach((w, i) => {
    cards.push({ id: i, lang: 'de', text: w.de, pairId: i });
    cards.push({ id: i, lang: 'bg', text: w.bg, pairId: i });
  });
  cards = shuffle(cards);

  cards.forEach((c, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = idx;
    cell.onclick = () => flipCell(idx);

    cell.innerHTML = `
      <div class="cell-inner">
        <div class="cell-face cell-back-face">
          <span class="qmark">?</span>
        </div>
        <div class="cell-face cell-front-face ${c.lang}-card">
          <div class="cell-lang">${c.lang === 'de' ? 'Deutsch' : 'Български'}</div>
          <div class="cell-word">${c.text}</div>
          <div class="cell-flag">${c.lang === 'de' ? '🇩🇪' : '🇧🇬'}</div>
        </div>
      </div>
    `;
    grid.appendChild(cell);
  });
}

function flipCell(idx) {
  if (locked) return;
  const cell = document.querySelectorAll('.cell')[idx];
  if (cell.classList.contains('flipped') || cell.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;

  // start timer on first flip
  if (!gameStarted) {
    gameStarted = true;
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timerNum').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);
  }

  cell.classList.add('flipped');
  flippedCards.push({ idx, card: cards[idx] });

  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('movesNum').textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flippedCards;
  const cellA = document.querySelectorAll('.cell')[a.idx];
  const cellB = document.querySelectorAll('.cell')[b.idx];

  if (a.card.pairId === b.card.pairId && a.card.lang !== b.card.lang) {
    // match!
    locked = true;
    setTimeout(() => {
      cellA.classList.add('matched', 'just-matched');
      cellB.classList.add('matched', 'just-matched');
      matchedPairs++;
      document.getElementById('pairsLeft').textContent = 10 - matchedPairs;
      document.getElementById('dot' + (matchedPairs - 1)).classList.add('done');

      showToast(WORDS[a.card.pairId].de + ' = ' + WORDS[a.card.pairId].bg);

      flippedCards = [];
      locked = false;

      if (matchedPairs === 10) winGame();
    }, 400);
  } else {
    // no match
    locked = true;
    setTimeout(() => {
      cellA.classList.add('wrong-pick');
      cellB.classList.add('wrong-pick');
      setTimeout(() => {
        cellA.classList.remove('flipped', 'wrong-pick');
        cellB.classList.remove('flipped', 'wrong-pick');
        flippedCards = [];
        locked = false;
      }, 500);
    }, 600);
  }
}

function showToast(text) {
  const t = document.getElementById('hintToast');
  t.textContent = '✓ ' + text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function winGame() {
  clearInterval(timerInterval);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const timeStr = m + ':' + String(s).padStart(2, '0');

  document.getElementById('winMoves').textContent = moves;
  document.getElementById('winTime').textContent = timeStr;

  // stars based on moves
  let stars = moves <= 14 ? 3 : moves <= 20 ? 2 : 1;
  document.getElementById('winStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('show');
    spawnConfetti();
  }, 600);
}

function spawnConfetti() {
  const colors = ['#e07850', '#7c4dff', '#e8a830', '#2d6a4f', '#e94560', '#5dade2'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (5 + Math.random() * 8) + 'px';
    c.style.height = (5 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    c.style.animationDuration = (2 + Math.random() * 3) + 's';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

function restartGame() {
  document.getElementById('winOverlay').classList.remove('show');
  matchedPairs = 0;
  moves = 0;
  seconds = 0;
  gameStarted = false;
  locked = false;
  flippedCards = [];
  clearInterval(timerInterval);
  document.getElementById('movesNum').textContent = '0';
  document.getElementById('timerNum').textContent = '0:00';
  document.getElementById('pairsLeft').textContent = '10';
  buildDots();
  buildGrid();
}

// init
buildDots();
buildGrid();
</script>
</body>
</html>
