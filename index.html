<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алиса · Deutsch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#fdf6ec;
    --card1:#ff6b6b;
    --card2:#51cf66;
    --card3:#339af0;
    --text:#2b2b2b;
    --shadow:rgba(0,0,0,.12);
  }

  body{
    font-family:'Nunito',sans-serif;
    background:var(--bg);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
    overflow-x:hidden;
  }

  /* floating bg shapes */
  body::before,body::after{
    content:'';position:fixed;border-radius:50%;z-index:0;opacity:.08;
    pointer-events:none;
  }
  body::before{
    width:340px;height:340px;background:var(--card1);
    top:-80px;left:-60px;
    animation:drift 18s ease-in-out infinite alternate;
  }
  body::after{
    width:260px;height:260px;background:var(--card3);
    bottom:-60px;right:-40px;
    animation:drift 22s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift{
    0%{transform:translate(0,0) scale(1)}
    100%{transform:translate(40px,30px) scale(1.12)}
  }

  .page{position:relative;z-index:1;width:100%;max-width:460px;text-align:center}

  /* header */
  .hello{
    font-family:'Caveat',cursive;
    font-size:clamp(2.4rem,7vw,3.6rem);
    color:var(--text);
    margin-bottom:.2em;
    animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both;
  }
  .hello span{color:var(--card1)}
  .sub{
    font-size:1.05rem;color:#777;margin-bottom:2.4rem;
    animation:popIn .6s .15s cubic-bezier(.175,.885,.32,1.275) both;
  }

  /* cards */
  .cards{display:flex;flex-direction:column;gap:1.1rem}

  .card{
    text-decoration:none;color:#fff;
    border-radius:1.2rem;
    padding:1.6rem 1.4rem;
    display:flex;align-items:center;gap:1rem;
    box-shadow:0 6px 24px var(--shadow);
    transition:transform .22s,box-shadow .22s;
    position:relative;overflow:hidden;
    animation:slideUp .55s cubic-bezier(.175,.885,.32,1.275) both;
  }
  .card:nth-child(1){background:var(--card1);animation-delay:.25s}
  .card:nth-child(2){background:var(--card2);animation-delay:.38s}
  .card:nth-child(3){background:var(--card3);animation-delay:.50s}

  .card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 10px 32px var(--shadow)}
  .card:active{transform:scale(.97)}

  /* shimmer on hover */
  .card::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.25) 50%,transparent 60%);
    transform:translateX(-100%);transition:transform .5s;
  }
  .card:hover::after{transform:translateX(100%)}

  .icon{
    font-size:2.2rem;flex-shrink:0;
    width:56px;height:56px;
    background:rgba(255,255,255,.22);
    border-radius:.8rem;
    display:grid;place-items:center;
  }

  .card-body{text-align:left}
  .card-title{font-weight:900;font-size:1.2rem;line-height:1.2}
  .card-desc{font-size:.85rem;opacity:.85;margin-top:.2em}

  .arrow{
    margin-left:auto;font-size:1.4rem;opacity:.6;
    transition:transform .2s;flex-shrink:0;
  }
  .card:hover .arrow{transform:translateX(4px);opacity:1}

  /* footer */
  .foot{
    margin-top:2.6rem;font-size:.8rem;color:#bbb;
    animation:popIn .6s .6s cubic-bezier(.175,.885,.32,1.275) both;
  }

  @keyframes popIn{
    0%{opacity:0;transform:scale(.85) translateY(12px)}
    100%{opacity:1;transform:scale(1) translateY(0)}
  }
  @keyframes slideUp{
    0%{opacity:0;transform:translateY(28px)}
    100%{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>

<div class="page">
  <h1 class="hello">Привет, <span>Алиса</span> 🇩🇪</h1>
  <p class="sub">Выбери, чем займёмся сегодня</p>

  <div class="cards">

    <a class="card" href="card.html">
      <div class="icon">🪪</div>
      <div class="card-body">
        <div class="card-title">Письмо Алисе</div>
        <div class="card-desc">Просто письмо для тебя</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="memory-alisa.html">
      <div class="icon">🧠</div>
      <div class="card-body">
        <div class="card-title">Memory-игра</div>
        <div class="card-desc">Найди пары слов и картинок</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="vocab-alisa.html">
      <div class="icon">💬</div>
      <div class="card-body">
        <div class="card-title">10 фраз</div>
        <div class="card-desc">Полезные фразы на каждый день</div>
      </div>
      <span class="arrow">→</span>
    </a>

  </div>

  <p class="foot">GitHub Pages · Deutsch mit Spaß ✨</p>
</div>

</body>
</html>
